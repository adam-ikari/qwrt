name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=OFF \
            -DQWRT_WITH_WAMR=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

      - name: Test (compliance, allowed-fail)
        run: |
          ctest -L compliance --output-on-failure || true
        working-directory: build
