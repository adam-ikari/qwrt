name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=OFF \
            -DQWRT_WITH_WAMR=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure (ASan + crypto ext)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=OFF \
            -DQWRT_WITH_WAMR=OFF \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline, ASan + leak detection)
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: ctest -L offline --output-on-failure
        working-directory: build

