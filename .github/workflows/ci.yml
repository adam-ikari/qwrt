name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ============================================================================
  # Minimal build: all optional features OFF, mock PAL only.
  # Verifies the build succeeds when everything is disabled — this is the
  # "negative configuration" baseline that catches #ifdef fallback breakage.
  # ============================================================================
  minimal:
    runs-on: ubuntu-latest
    name: minimal (all features OFF)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_PAL_UV=OFF \
            -DQWRT_WITH_WASM3=OFF \
            -DQWRT_WITH_WAMR=OFF \
            -DQWRT_WITH_TLS=OFF \
            -DQWRT_WITH_CRYPTO_EXT=OFF \
            -DQWRT_WITH_COMPRESS=OFF \
            -DQWRT_WITH_TEXTCODEC=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # Feature matrix: independent toggles for TLS, crypto-ext, compress, textcodec.
  # Tests each feature in isolation so a single toggle doesn't accidentally drag
  # in dependencies. PAL_UV stays ON (default) for network tests to compile.
  # ============================================================================
  feature-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Note: QWRT_WITH_TLS=ON forces QWRT_WITH_CRYPTO_EXT=ON (TLS
          # requires crypto), so tls=ON crypto=OFF is not a valid combo.
          # This entry tests the inverse isolation: crypto WITHOUT TLS
          # (HTTP-only pal_uv, no HTTPS) still builds and passes.
          - name: "tls=OFF crypto=ON"
            tls: "OFF"
            crypto_ext: "ON"
            compress: "ON"
            textcodec: "ON"
          - name: "tls=ON crypto=ON"
            tls: "ON"
            crypto_ext: "ON"
            compress: "ON"
            textcodec: "ON"
          - name: "compress=OFF"
            tls: "ON"
            crypto_ext: "ON"
            compress: "OFF"
            textcodec: "ON"
          - name: "textcodec=OFF"
            tls: "ON"
            crypto_ext: "ON"
            compress: "ON"
            textcodec: "OFF"
    name: feature (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=OFF \
            -DQWRT_WITH_WAMR=OFF \
            -DQWRT_WITH_TLS=${{ matrix.tls }} \
            -DQWRT_WITH_CRYPTO_EXT=${{ matrix.crypto_ext }} \
            -DQWRT_WITH_COMPRESS=${{ matrix.compress }} \
            -DQWRT_WITH_TEXTCODEC=${{ matrix.textcodec }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # WAMR: build and test with the WAMR WebAssembly engine.
  # WAMR must be pre-built before configuring qwrt (CMake checks for libvmlib.a).
  # ============================================================================
  wamr:
    runs-on: ubuntu-latest
    name: wamr (WASM engine)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Build WAMR
        run: |
          cmake -B deps/wamr/build_lib -S deps/wamr \
            -DWAMR_BUILD_INTERP=1 \
            -DWAMR_BUILD_WASM_C_API=1 \
            -DWAMR_BUILD_LIBC_BUILTIN=1
          cmake --build deps/wamr/build_lib --parallel

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=OFF \
            -DQWRT_WITH_WAMR=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # Sanitizers: ASan + UBSan across feature configurations.
  # ============================================================================
  asan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "crypto-ext on"
            crypto_ext: "ON"
          - name: "crypto-ext off (minimal)"
            crypto_ext: "OFF"
    name: asan (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure (ASan)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=OFF \
            -DQWRT_WITH_WAMR=OFF \
            -DQWRT_WITH_TLS=${{ matrix.crypto_ext }} \
            -DQWRT_WITH_CRYPTO_EXT=${{ matrix.crypto_ext }} \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline, ASan + leak detection)
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: ctest -L offline --output-on-failure
        working-directory: build

  ubsan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc, cxx: g++ }
          - { cc: clang, cxx: clang++ }
    name: ubsan (${{ matrix.compiler.cc }})
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build clang

      - name: Configure (UBSan)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=OFF \
            -DQWRT_WITH_WAMR=OFF \
            -DCMAKE_C_FLAGS="-fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined -fno-sanitize-recover=undefined"

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline, UBSan)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # wasm3: build and test with the wasm3 WebAssembly engine.
  # ============================================================================
  wasm3:
    runs-on: ubuntu-latest
    name: wasm3 (WASM engine)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=ON \
            -DQWRT_WITH_WAMR=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # Release build: optimised, wasm3 ON.
  # ============================================================================
  release:
    runs-on: ubuntu-latest
    name: release build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure (Release)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=ON \
            -DQWRT_WITH_WAMR=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # Coverage: gcov with wasm3 ON.
  # ============================================================================
  coverage:
    runs-on: ubuntu-latest
    name: coverage (gcov)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build lcov

      - name: Configure (Coverage)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=ON \
            -DQWRT_WITH_WAMR=OFF \
            -DCMAKE_C_FLAGS="--coverage -fprofile-update=atomic -g -O0" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline, coverage)
        run: ctest -L offline --output-on-failure
        working-directory: build

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --rc lcov_branch_coverage=1 \
            --exclude '*/deps/*' --exclude '*/test/*' --exclude '*/build/*'
          lcov --summary coverage.info

  # ============================================================================
  # Examples: build all example programs and run the offline ones.
  # Guards the examples/ directory against bit-rot — they have no test coverage
  # otherwise. Mock-backed examples build & run with no network; the libuv
  # examples are built (and the non-network ones run) to catch link/compile
  # regressions.
  # ============================================================================
  examples:
    runs-on: ubuntu-latest
    name: examples
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQWRT_BUILD_EXAMPLES=ON \
            -DQWRT_WITH_WASM3=ON

      - name: Build examples
        run: cmake --build build --parallel

      - name: Run offline examples
        run: |
          # mock-backed: no event loop, no network
          ./build/examples/example_mock
          ./build/examples/example_bytecode
          # libuv-backed, non-network
          ./build/examples/example_minimal
          ./build/examples/example_timers
          ./build/examples/example_storage

  # ============================================================================
  # Network tests: outbound HTTP/HTTPS against httpbin.org.
  # Network is inherently flaky (httpbin rate-limits / 503s), so this job is
  # non-blocking — failures here never fail the CI run. It surfaces real
  # regressions in the fetch/stream/TLS paths (chunked decode, TLS handshake,
  # streaming) that the offline suite can't reach.
  # ============================================================================
  network:
    runs-on: ubuntu-latest
    name: network (non-blocking)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=ON \
            -DQWRT_WITH_TLS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (network)
        run: ctest -L network --output-on-failure
        working-directory: build

  # ============================================================================
  # Debugger: applies the QuickJS-ng patch and runs the DAP tests. Guards the
  # debugger (engine patch + src/debugger.c + src/debugger_dap.c) against
  # bit-rot. The async test needs libuv (qwrt_uv).
  # ============================================================================
  debugger:
    runs-on: ubuntu-latest
    name: debugger (DAP)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_DEBUGGER=ON \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (dap)
        run: ctest -L dap --output-on-failure
        working-directory: build

  # ============================================================================
  # clang-tidy: static analysis with wasm3 ON.
  # ============================================================================
  clang-tidy:
    runs-on: ubuntu-latest
    name: clang-tidy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build clang-tidy

      - name: Configure (clang-tidy)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WASM3=ON \
            -DQWRT_WITH_WAMR=OFF \
            -DCLANG_TIDY_EXE=clang-tidy \
            -DQWRT_RUN_CLANG_TIDY=ON

      - name: Build (with clang-tidy)
        run: cmake --build build --parallel

