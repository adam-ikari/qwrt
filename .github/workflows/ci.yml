name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ============================================================================
  # Minimal build: all optional features OFF, mock PAL only.
  # ============================================================================
  minimal:
    runs-on: ubuntu-latest
    name: minimal (all features OFF)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_PAL_UV=OFF \
            -DQWRT_WITH_WAMR=OFF \
            -DQWRT_WITH_TLS=OFF \
            -DQWRT_WITH_CRYPTO_EXT=OFF \
            -DQWRT_WITH_COMPRESS=OFF \
            -DQWRT_WITH_TEXTCODEC=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # Feature matrix: independent toggles for TLS, crypto-ext, compress, textcodec.
  # WAMR is disabled across the matrix to keep builds fast; the wamr job below
  # covers WASM compliance.
  # ============================================================================
  feature-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "tls=OFF crypto=ON"
            tls: "OFF"
            crypto_ext: "ON"
            compress: "ON"
            textcodec: "ON"
          - name: "tls=ON crypto=ON"
            tls: "ON"
            crypto_ext: "ON"
            compress: "ON"
            textcodec: "ON"
          - name: "compress=OFF"
            tls: "ON"
            crypto_ext: "ON"
            compress: "OFF"
            textcodec: "ON"
          - name: "textcodec=OFF"
            tls: "ON"
            crypto_ext: "ON"
            compress: "ON"
            textcodec: "OFF"
    name: feature (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WAMR=OFF \
            -DQWRT_WITH_TLS=${{ matrix.tls }} \
            -DQWRT_WITH_CRYPTO_EXT=${{ matrix.crypto_ext }} \
            -DQWRT_WITH_COMPRESS=${{ matrix.compress }} \
            -DQWRT_WITH_TEXTCODEC=${{ matrix.textcodec }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # WAMR: default WASM engine with Fast JIT. This is the primary WASM path.
  # ============================================================================
  wamr:
    runs-on: ubuntu-latest
    name: wamr (default WASM engine, Fast JIT)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # wasm3: alternative WASM engine. Tests the fallback path remains working.
  # ============================================================================
  wasm3:
    runs-on: ubuntu-latest
    name: wasm3 (alternative WASM engine)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_WAMR=OFF \
            -DQWRT_WITH_WASM3=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # Sanitizers: ASan + UBSan with WAMR default engine.
  # ============================================================================
  asan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "default (WAMR, all features)"
            wamr: "ON"
          - name: "minimal (all features OFF)"
            wamr: "OFF"
    name: asan (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure (ASan)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            ${{ matrix.wamr == 'ON' && '-DQWRT_WITH_WAMR=ON' || '-DQWRT_WITH_WAMR=OFF -DQWRT_WITH_TLS=OFF -DQWRT_WITH_CRYPTO_EXT=OFF -DQWRT_WITH_COMPRESS=OFF -DQWRT_WITH_TEXTCODEC=OFF' }} \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline, ASan + leak detection)
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: ctest -L offline --output-on-failure
        working-directory: build

  ubsan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc, cxx: g++ }
          - { cc: clang, cxx: clang++ }
    name: ubsan (${{ matrix.compiler.cc }})
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build clang

      - name: Configure (UBSan)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined -fno-sanitize-recover=undefined"

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline, UBSan)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # Release build: WAMR default, optimised.
  # ============================================================================
  release:
    runs-on: ubuntu-latest
    name: release build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure (Release)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQWRT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline)
        run: ctest -L offline --output-on-failure
        working-directory: build

  # ============================================================================
  # Coverage: gcov with WAMR default engine.
  # ============================================================================
  coverage:
    runs-on: ubuntu-latest
    name: coverage (gcov)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build lcov

      - name: Configure (Coverage)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="--coverage -fprofile-update=atomic -g -O0" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --parallel

      - name: Test (offline, coverage)
        run: ctest -L offline --output-on-failure
        working-directory: build

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --rc lcov_branch_coverage=1 \
            --exclude '*/deps/*' --exclude '*/test/*' \
            --ignore-errors unused
          lcov --summary coverage.info

  # ============================================================================
  # Examples: build all example programs and run the offline ones.
  # ============================================================================
  examples:
    runs-on: ubuntu-latest
    name: examples
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQWRT_BUILD_EXAMPLES=ON

      - name: Build examples
        run: cmake --build build --parallel

      - name: Run offline examples
        run: |
          ./build/examples/example_mock
          ./build/examples/example_bytecode
          ./build/examples/example_minimal
          ./build/examples/example_timers
          ./build/examples/example_storage

  # ============================================================================
  # Network tests: outbound HTTP/HTTPS against httpbin.org (non-blocking).
  # ============================================================================
  network:
    runs-on: ubuntu-latest
    name: network (non-blocking)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DQWRT_WITH_TLS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (network)
        run: ctest -L network --output-on-failure
        working-directory: build

  # ============================================================================
  # Debugger: applies the QuickJS-ng patch and runs DAP tests.
  # ============================================================================
  debugger:
    runs-on: ubuntu-latest
    name: debugger (DAP)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_DEBUGGER=ON \
            -DQWRT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (dap)
        run: ctest -L dap --output-on-failure
        working-directory: build

  # ============================================================================
  # test262: ECMAScript language conformance — guards against QuickJS-ng
  # patch regressions that would reduce JS syntax/API support.
  # ============================================================================
  test262:
    runs-on: ubuntu-latest
    name: test262 (ES conformance)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel --target test262_runner

      - name: Test (test262 baseline)
        run: |
          cd build && ctest -L test262 --output-on-failure
          # Verify pass rate hasn't regressed below baseline
          # Baseline: 270 PASS, 0 FAIL (qwrt-level), established 2026-07-18

  # ============================================================================
  # clang-tidy: static analysis.
  # ============================================================================
  clang-tidy:
    runs-on: ubuntu-latest
    name: clang-tidy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build clang-tidy

      - name: Configure (clang-tidy)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQWRT_BUILD_TESTS=ON \
            -DCLANG_TIDY_EXE=clang-tidy \
            -DQWRT_RUN_CLANG_TIDY=ON

      - name: Build (with clang-tidy)
        run: cmake --build build --parallel